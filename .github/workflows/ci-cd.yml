name: ci

# Single unified pipeline. The full build + test suite (lint, the Python-vs-Zig
# differential test, wheels, static binaries, the container image) runs on every
# PR and on pushes to `main`, catching issues before they land. Pushing a `v*`
# tag runs the same suite and additionally publishes; the publish jobs are
# tag-gated. Release flow: bump the version in a PR (`make bump VERSION=...`) and
# merge it; on a green `main` build the `tag-release` job tags `v<version>`, which
# fires the publish jobs. No manual tagging, and a red `main` never gets tagged.
#
# First publish needs a one-time PyPI Trusted Publisher (project withcache,
# workflow ci-cd.yml, environment pypi) and a RELEASE_PAT secret (the tag push
# uses it so the new tag triggers this workflow's publish jobs).
on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

# Build steps are `make` targets — reproduce with `make wheels` / `make binaries`.
jobs:
  # Refuse to re-release a version PyPI already has: PyPI is immutable, but a
  # retag-after-publish would rebuild the GitHub release assets from a newer
  # commit and silently drift from the frozen wheel. (bty's integrity guard.)
  check-not-published:
    runs-on: ubuntu-latest
    steps:
      - name: Abort if PyPI already has this version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          echo "Checking PyPI for withcache==${version}..."
          if curl -sfL "https://pypi.org/pypi/withcache/json" \
             | python3 -c "import sys, json; sys.exit(0 if '${version}' in json.load(sys.stdin)['releases'] else 1)"; then
            echo "::error::PyPI already has withcache==${version}. Bump the version, retag, and push."
            exit 1
          fi
          echo "OK: withcache==${version} not on PyPI yet; release continues."

  lint:
    needs: check-not-published
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: make lint format-check version-check

  test:
    needs: check-not-published
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # Install FastAPI / uvicorn / jinja2 (runtime deps via ``pip
      # install .``) + httpx (``fastapi.testclient`` imports it).
      - run: pip install . httpx
      - run: make test

  # Build the native shim and run the suite WITH it present, so the
  # Python-vs-Zig differential test actually executes before we ship.
  shim:
    needs: check-not-published
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install .
      - run: make shim test

  # Platform wheels (static-musl binary, manylinux + musllinux tags) + the pure
  # fallback wheel + sdist — `make wheels` loops the matrix internally.
  wheels:
    needs: [lint, test, shim]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: make wheels
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  # Raw static binaries (+ sha256) for Python-less boxes — `make binaries`
  # builds + checksums both arches into dist-bin/.
  binaries:
    needs: [lint, test, shim]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: make binaries
      - uses: actions/upload-artifact@v4
        with:
          name: dist-bin
          path: dist-bin/*

  # On a green main build, tag a new version so the publish jobs (which run on
  # the tag) fire. Gated on the full suite via `needs`, so a red main never gets
  # tagged. The tag is pushed with RELEASE_PAT because a GITHUB_TOKEN push would
  # not trigger this workflow.
  tag-release:
    needs: [lint, test, shim, wheels, binaries]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}
      - name: Tag the version if it is new
        run: |
          set -euo pipefail
          version=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' src/withcache/__init__.py)
          test -n "$version" || { echo "could not read __version__"; exit 1; }
          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "${tag} already exists; nothing to do."
            exit 0
          fi
          git tag "${tag}"
          git push origin "${tag}"
          echo "Tagged ${tag}; ci-cd.yml will publish it."

  # Multi-arch cache-host container -> ghcr.io/safl/withcache. Lets it run as a
  # service (e.g. alongside bty) without a from-source build. Gated like the
  # other artifact jobs; independent of the GitHub release.
  publish-image:
    needs: [lint, test, shim]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3 # arm64 via emulation on the amd64 runner
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/safl/withcache:${{ steps.v.outputs.version }}
            ghcr.io/safl/withcache:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Create the GitHub release at the tag and attach wheels + sdist + binaries.
  release:
    needs: [wheels, binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # softprops/action-gh-release creates the release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: dist-bin
          path: dist-bin
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*
            dist-bin/*

  # Strictly last: PyPI is for life (a published version can't be re-uploaded),
  # so we only ship there after the GitHub release page is up cleanly.
  publish-pypi:
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/withcache
    permissions:
      id-token: write # OIDC for PyPI Trusted Publishing — no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true # idempotent if a retry re-uploads
