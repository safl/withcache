name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # stdlib-only tests; curl is present on the runners, wget-probe test
      # skips itself where wget is absent (e.g. macOS).
      - run: python -m unittest discover -s tests -v

  # Build the native shim and run the suite WITH it present, so the
  # differential test (Python oracle vs Zig binary) actually executes.
  shim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # If 0.16.0 isn't yet a fetchable Zig release, pin to "master".
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build native shim
        working-directory: shim
        run: zig build
      - run: python -m unittest discover -s tests -v

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
