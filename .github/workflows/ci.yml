name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Each step is a `make` target — reproduce any of this locally with the same command.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: make lint format-check version-check

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: make test

  # Build the native shim and run the suite WITH it present, so the
  # Python-vs-Zig differential test actually executes.
  shim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # If 0.16.0 isn't yet a fetchable Zig release, pin to "master".
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make shim test

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: make wheel
