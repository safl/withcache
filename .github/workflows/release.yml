name: release

# Pushing a `v*` tag runs the full release: lint + test (incl. the Python-vs-Zig
# differential test) gate it, then it builds the wheels + static shim binaries,
# CREATES the GitHub release with them attached, and finally publishes to PyPI.
# Same tag-triggered flow as safl/bty and safl/vfio-user-kvssd:
#   make bump VERSION=0.2.0 && git commit -am '...' && git tag v0.2.0 && git push --tags
#
# `workflow_dispatch` runs the build only (no release/publish) as a smoke test.
#
# First publish needs a one-time PyPI Trusted Publisher (project withcache,
# workflow release.yml, environment pypi) — no API token required.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

# Build steps are `make` targets — reproduce with `make wheels` / `make binaries`.
jobs:
  # Refuse to re-release a version PyPI already has: PyPI is immutable, but a
  # retag-after-publish would rebuild the GitHub release assets from a newer
  # commit and silently drift from the frozen wheel. (bty's integrity guard.)
  check-not-published:
    runs-on: ubuntu-latest
    steps:
      - name: Abort if PyPI already has this version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          echo "Checking PyPI for withcache==${version}..."
          if curl -sfL "https://pypi.org/pypi/withcache/json" \
             | python3 -c "import sys, json; sys.exit(0 if '${version}' in json.load(sys.stdin)['releases'] else 1)"; then
            echo "::error::PyPI already has withcache==${version}. Bump the version, retag, and push."
            exit 1
          fi
          echo "OK: withcache==${version} not on PyPI yet; release continues."

  lint:
    needs: check-not-published
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: make lint format-check version-check

  test:
    needs: check-not-published
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: make test

  # Build the native shim and run the suite WITH it present, so the
  # Python-vs-Zig differential test actually executes before we ship.
  shim:
    needs: check-not-published
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make shim test

  # Platform wheels (static-musl binary, manylinux + musllinux tags) + the pure
  # fallback wheel + sdist — `make wheels` loops the matrix internally.
  wheels:
    needs: [lint, test, shim]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: make wheels
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  # Raw static binaries (+ sha256) for Python-less boxes — `make binaries`
  # builds + checksums both arches into dist-bin/.
  binaries:
    needs: [lint, test, shim]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: make binaries
      - uses: actions/upload-artifact@v4
        with:
          name: dist-bin
          path: dist-bin/*

  # Multi-arch cache-host container -> ghcr.io/safl/withcache. Lets it run as a
  # service (e.g. alongside bty) without a from-source build. Gated like the
  # other artifact jobs; independent of the GitHub release.
  publish-image:
    needs: [lint, test, shim]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3 # arm64 via emulation on the amd64 runner
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/safl/withcache:${{ steps.v.outputs.version }}
            ghcr.io/safl/withcache:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Create the GitHub release at the tag and attach wheels + sdist + binaries.
  release:
    needs: [wheels, binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # softprops/action-gh-release creates the release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: dist-bin
          path: dist-bin
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*
            dist-bin/*

  # Strictly last: PyPI is for life (a published version can't be re-uploaded),
  # so we only ship there after the GitHub release page is up cleanly.
  publish-pypi:
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/withcache
    permissions:
      id-token: write # OIDC for PyPI Trusted Publishing — no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true # idempotent if a retry re-uploads
