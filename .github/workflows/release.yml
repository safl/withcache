name: release
on:
  release:
    types: [published]

permissions:
  contents: read

# Everything is gated: publish/upload jobs `needs` the build jobs, which `needs`
# lint+test — a release only ships if everything is green.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m unittest discover -s tests -v

  # Platform wheels: one static musl binary per arch, tagged for BOTH glibc
  # (manylinux) and musl (musllinux) — a static binary has no libc dep, so it
  # runs under either. `pipx install fromcache` then gets the NATIVE shim.
  wheels:
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { ztarget: x86_64-linux-musl, wtag: py3-none-manylinux_2_17_x86_64 }
          - { ztarget: x86_64-linux-musl, wtag: py3-none-musllinux_1_2_x86_64 }
          - { ztarget: aarch64-linux-musl, wtag: py3-none-manylinux_2_17_aarch64 }
          - { ztarget: aarch64-linux-musl, wtag: py3-none-musllinux_1_2_aarch64 }
    steps:
      - uses: actions/checkout@v4
      # If 0.16.0 isn't yet a fetchable Zig release, pin to "master".
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - env:
          FROMCACHE_ZIG_TARGET: ${{ matrix.ztarget }}
          FROMCACHE_WHEEL_TAG: ${{ matrix.wtag }}
        run: python -m build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.wtag }}
          path: dist/*.whl

  # The universal fallback wheel (Python launchers) + the sdist. Built without
  # zig, so the hook emits the pure py3-none-any wheel.
  sdist:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-pure
          path: dist/*

  publish:
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC for PyPI Trusted Publishing — no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  # Also attach the raw static binaries to the GitHub Release, for boxes with
  # no Python/pip (minimal/distroless images). One binary serves both tools.
  binaries:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-linux-musl, aarch64-linux-musl]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build static binary
        working-directory: shim
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSmall -Dstatic
      - name: Stage + checksum
        run: |
          mkdir -p out
          cp shim/zig-out/bin/fromcache-shim out/fromcache-shim-${{ matrix.target }}
          ( cd out && sha256sum fromcache-shim-${{ matrix.target }} > fromcache-shim-${{ matrix.target }}.sha256 )
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" out/* --clobber
