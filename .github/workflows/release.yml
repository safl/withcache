name: release
on:
  release:
    types: [published]

permissions:
  contents: read

# Publishing to PyPI is gated: the publish job `needs` build, which `needs`
# both lint and test — so a release only ships if everything is green.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m unittest discover -s tests -v

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC for PyPI Trusted Publishing — no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  # Cross-compile the native shim to static, dependency-free binaries and attach
  # them to the GitHub Release. One binary serves both tools (dispatch on argv[0]);
  # download, chmod +x, and symlink it as `curl` / `wget` on the client's PATH.
  shim:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload release assets
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-linux-musl, aarch64-linux-musl]
    steps:
      - uses: actions/checkout@v4
      # If 0.16.0 isn't yet a fetchable Zig release, pin to "master".
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build static binary
        working-directory: shim
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSmall -Dstatic
      - name: Stage + checksum
        run: |
          mkdir -p out
          cp shim/zig-out/bin/fromcache-shim out/fromcache-shim-${{ matrix.target }}
          ( cd out && sha256sum fromcache-shim-${{ matrix.target }} > fromcache-shim-${{ matrix.target }}.sha256 )
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" out/* --clobber
